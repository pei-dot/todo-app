<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>とぅどぅ</title>
  <link rel="stylesheet" href="todo.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6c63ff">
  <!-- iOS対応 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="とぅどぅ">
  <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
  <div class="container">
    <div class="title-row">
      <h1>とぅどぅ</h1>
      <div class="title-actions">
        <button id="selectModeBtn" class="select-mode-btn">まとめて選択</button>
        <button id="installBtn" class="install-btn" hidden>インストール</button>
        <button id="historyBtn" class="history-btn">履歴</button>
      </div>
    </div>
    <div class="input-row">
      <div class="select-wrapper">
        <select class="type-select" id="typeSelect">
          <option value="task">タスク</option>
          <option value="list">リスト</option>
        </select>
        <span class="select-arrow">
          <svg width="10" height="6" viewBox="0 0 10 6" fill="none">
            <path d="M1 1l4 4 4-4" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </div>
      <input type="text" id="mainInput" placeholder="タスクを入力..." />
      <button class="add-btn" id="addBtn">追加</button>
    </div>
    <div id="selectBar" class="select-bar" hidden>
      <div class="sel-bar-main" id="selBarMain">
        <button id="selAllBtn" class="sel-all-btn">全選択</button>
        <span id="selCount" class="sel-count">0件選択中</span>
        <button id="selDeleteBtn" class="sel-delete-btn" disabled>削除</button>
        <button id="selCancelBtn" class="sel-cancel-btn">キャンセル</button>
      </div>
      <div class="sel-bar-confirm" id="selBarConfirm" hidden>
        <span id="selConfirmMsg" class="sel-confirm-msg"></span>
        <button id="selConfirmYesBtn" class="confirm-yes-btn">削除</button>
        <button id="selConfirmNoBtn" class="confirm-no-btn">戻る</button>
      </div>
    </div>

    <div id="itemList"></div>
    <p class="empty" id="emptyMsg">アイテムがありません</p>

    <div id="historyPanel" class="history-panel" hidden>
      <div class="history-header">
        <span class="history-title">履歴</span>
        <button id="historyClearBtn" class="history-clear-btn">クリア</button>
        <button id="historyCloseBtn" class="history-close-btn">×</button>
      </div>
      <div id="historyList" class="history-list"></div>
      <p id="historyEmptyMsg" class="history-empty-msg">履歴はありません</p>
    </div>
  </div>
  <script src="todo.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.hidden = false;
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.hidden = true;
    });

    window.addEventListener('appinstalled', () => {
      installBtn.hidden = true;
      deferredPrompt = null;
    });
  </script>
</body>
</html>
