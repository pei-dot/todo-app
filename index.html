<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>とぅどぅ</title>
  <link rel="stylesheet" href="todo.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6c63ff">
  <!-- iOS対応 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="とぅどぅ">
  <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
  <div class="container">
    <div class="title-row">
      <h1>とぅどぅ</h1>
      <div class="title-actions">
        <button id="calendarModeBtn" class="calendar-mode-btn" title="カレンダー">
          <img src="./calendar_icon.png" alt="カレンダー" class="calendar-mode-icon">
        </button>
        <button id="selectModeBtn" class="select-mode-btn">まとめて選択</button>
        <button id="historyBtn" class="history-btn">履歴</button>
      </div>
    </div>
    <div class="input-row">
      <div class="select-wrapper">
        <select class="type-select" id="typeSelect">
          <option value="task">タスク</option>
          <option value="list">リスト</option>
        </select>
        <span class="select-arrow">
          <svg width="10" height="6" viewBox="0 0 10 6" fill="none">
            <path d="M1 1l4 4 4-4" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </div>
      <input type="text" id="mainInput" placeholder="タスクを入力..." />
      <button class="add-btn" id="addBtn">追加</button>
    </div>
    <div id="selectBar" class="select-bar" hidden>
      <div class="sel-bar-main" id="selBarMain">
        <button id="selAllBtn" class="sel-all-btn">全選択</button>
        <span id="selCount" class="sel-count">0件選択中</span>
        <button id="selDeleteBtn" class="sel-delete-btn" disabled>削除</button>
        <button id="selDeleteDoneBtn" class="sel-delete-done-btn">完了済みを削除</button>
        <button id="selCancelBtn" class="sel-cancel-btn">キャンセル</button>
      </div>
      <div class="sel-bar-confirm" id="selBarConfirm" hidden>
        <span id="selConfirmMsg" class="sel-confirm-msg"></span>
        <button id="selConfirmYesBtn" class="confirm-yes-btn">削除</button>
        <button id="selConfirmNoBtn" class="confirm-no-btn">戻る</button>
      </div>
    </div>

    <div id="itemList"></div>
    <p class="empty" id="emptyMsg">アイテムがありません</p>

    <!-- カレンダービュー -->
    <div id="calendarView" class="calendar-view" hidden>
      <div class="cal-header">
        <button id="calPrevBtn" class="cal-nav-btn">‹</button>
        <span id="calMonthLabel" class="cal-month-label"></span>
        <button id="calNextBtn" class="cal-nav-btn">›</button>
      </div>
      <div class="cal-weekdays">
        <span class="cal-sun">日</span><span>月</span><span>火</span>
        <span>水</span><span>木</span><span>金</span><span class="cal-sat">土</span>
      </div>
      <div id="calGrid" class="cal-grid"></div>
      <div id="calDayDetail" class="cal-day-detail" hidden>
        <div class="cal-detail-header">
          <span id="calDetailDate" class="cal-detail-date"></span>
          <div class="cal-detail-header-btns">
            <button id="calDetailAddBtn" class="cal-detail-add-btn">＋</button>
            <button id="calDetailCloseBtn" class="cal-detail-close">×</button>
          </div>
        </div>
        <div id="calDetailList" class="cal-detail-list"></div>
        <div id="calAddForm" class="cal-add-form" hidden>
          <input id="calAddInput" type="text" placeholder="タスク名を入力..." class="cal-add-input"/>
          <select id="calAddTarget" class="cal-add-select">
            <option value="none">リストなし</option>
            <option value="cal-only">カレンダーのみ</option>
          </select>
          <div class="cal-add-btns">
            <button id="calAddCancel" class="cal-add-cancel">キャンセル</button>
            <button id="calAddSubmit" class="cal-add-submit">追加</button>
          </div>
        </div>
      </div>
    </div>

    <div id="historyPanel" class="history-panel" hidden>
      <div class="history-header">
        <span class="history-title">履歴</span>
        <button id="historyClearBtn" class="history-clear-btn">クリア</button>
        <button id="historyCloseBtn" class="history-close-btn">×</button>
      </div>
      <div id="historyList" class="history-list"></div>
      <p id="historyEmptyMsg" class="history-empty-msg">履歴はありません</p>
    </div>
  </div>
  <script src="todo.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

  </script>
</body>
</html>
